name: release-artifacts

# Produces supply-chain artifacts for releases and main-branch snapshots:
#   - SBOM (CycloneDX JSON) generated by anchore/sbom-action via syft
#   - sha256 checksum file for the binary so consumers can verify downloads
#   - sigstore cosign keyless signature (OIDC) on tags
#
# Triggered on:
#   - Pushes to main (snapshot artifacts, not retained as a "release")
#   - Tag pushes matching v* (full release)
#   - workflow_dispatch (manual rerun)
#
# Security notes:
#   - Every github context value that ends up in a "run:" shell line is first
#     bound to an env variable on the step (the documented safe pattern
#     against workflow-injection). Untrusted contexts like commit messages
#     or PR titles are never referenced here.
#   - Actions are pinned by full commit SHA (with a version comment); we accept
#     the standard GitHub-hosted runner trust boundary.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Least privilege at the top; write scopes are granted per-job below.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25.12"

jobs:
  build-and-sign:
    name: Build, SBOM, sign
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write       # attach SBOM/release assets on tag builds
      id-token: write       # cosign keyless signing + attestation OIDC
      attestations: write   # SLSA build-provenance attestations (Sigstore/Rekor)
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Resolve build metadata
        id: meta
        env:
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "$REF" == refs/tags/* ]]; then
            VERSION="${REF#refs/tags/}"
          else
            VERSION="$(git describe --tags --always --dirty)"
          fi
          COMMIT="$(git rev-parse --short=12 HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "version=$VERSION"
            echo "commit=$COMMIT"
            echo "build_date=$BUILD_DATE"
          } >> "$GITHUB_OUTPUT"
      - name: Build bpfcompat
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-X github.com/kernel-guard/bpfcompat/internal/version.Version=${VERSION} \
            -X github.com/kernel-guard/bpfcompat/internal/version.Commit=${COMMIT} \
            -X github.com/kernel-guard/bpfcompat/internal/version.BuildDate=${BUILD_DATE}"
          go build -trimpath -ldflags "$LDFLAGS" -o dist/bpfcompat ./cmd/bpfcompat
          cp dist/bpfcompat dist/bpfcompat-linux-amd64
      - name: Build static validator
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libbpf-dev libelf-dev libzstd-dev zlib1g-dev
          make validator-static
          cp validator/c-libbpf/bin/bpfcompat-validator dist/bpfcompat-validator-static-linux-amd64
      - name: Compute checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum bpfcompat > bpfcompat.sha256
          sha256sum bpfcompat-linux-amd64 bpfcompat-validator-static-linux-amd64 > SHA256SUMS
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/bpfcompat.sbom.cdx.json
      # Non-falsifiable SLSA build provenance (Build L3): binds each binary's
      # digest to the exact repo/commit/workflow that produced it, signed
      # keylessly via OIDC and recorded in the public Sigstore transparency log.
      # Verify with: gh attestation verify <file> --repo Kernel-Guard/bpfcompat
      - name: Attest build provenance (tag releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/bpfcompat-linux-amd64
            dist/bpfcompat-validator-static-linux-amd64
      - name: Attest SBOM (tag releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: dist/bpfcompat-linux-amd64
          sbom-path: dist/bpfcompat.sbom.cdx.json
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the cosign CLI itself, not just the installer: without this
          # the installer fetches latest cosign, and cosign v3 defaults to
          # the new bundle format where --output-signature/--output-certificate
          # are ignored ("create bundle file: open : no such file or
          # directory" — broke the v0.3.1 tag build). Release assets and
          # docs/verifying-releases.md use the .sig/.crt pair, so stay on
          # cosign v2 until we migrate to bundles deliberately.
          cosign-release: "v2.6.3"
      - name: Sign binary + SBOM (tag releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          cosign sign-blob --yes dist/bpfcompat --output-signature dist/bpfcompat.sig --output-certificate dist/bpfcompat.crt
          cosign sign-blob --yes dist/SHA256SUMS --output-signature dist/SHA256SUMS.sig --output-certificate dist/SHA256SUMS.crt
          cosign sign-blob --yes dist/bpfcompat.sbom.cdx.json --output-signature dist/bpfcompat.sbom.cdx.sig --output-certificate dist/bpfcompat.sbom.cdx.crt
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bpfcompat-release-${{ steps.meta.outputs.version }}
          path: |
            dist/bpfcompat
            dist/bpfcompat.sha256
            dist/bpfcompat-linux-amd64
            dist/bpfcompat-validator-static-linux-amd64
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.crt
            dist/bpfcompat.sbom.cdx.json
            dist/bpfcompat.sig
            dist/bpfcompat.crt
            dist/bpfcompat.sbom.cdx.sig
            dist/bpfcompat.sbom.cdx.crt
          if-no-files-found: warn
      - name: Attach release assets (tag releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        # The action consumes these assets at run time to skip building from
        # source: bpfcompat-linux-amd64, bpfcompat-validator-static-linux-amd64,
        # and SHA256SUMS for verification.
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            dist/bpfcompat-linux-amd64
            dist/bpfcompat-validator-static-linux-amd64
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.crt
            dist/bpfcompat.sbom.cdx.json
