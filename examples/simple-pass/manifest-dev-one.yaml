name: simple-pass-dev-one
programs:
  - name: handle_exec
    section: tracepoint/syscalls/sys_enter_execve
    type: tracepoint
    attach:
      kind: tracepoint
      category: syscalls
      name: sys_enter_execve
      required: true
required_profiles:
  - ubuntu-22.04-5.15
functional_tests:
  - name: execve-stimulus-smoke
    command: "sh -c 'printf bpfcompat-functional-smoke'"
    timeout: 5s
    expect_exit_code: 0
    expect_stdout_contains: bpfcompat-functional-smoke
